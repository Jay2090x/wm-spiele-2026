<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM 2026 – Nächste Spiele</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a1f14;
      --card: rgba(255,255,255,0.05);
      --accent: #d4af37;
      --text: #f0f4f0;
      --muted: #8fa899;
      --border: rgba(255,255,255,0.09);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100dvh; overflow: hidden; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.2;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(26,77,50,0.5), transparent);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px 10px 6px;
      gap: 6px;
      max-width: 1150px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
      cursor: default;
      user-select: none;
    }

    .title span { color: var(--accent); }
    .title .trophy-btn { cursor: pointer; display: inline-block; }

    .mez {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(212,175,55,0.15);
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 8px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-head {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      padding: 5px 10px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-head .pill { float: right; color: #4cc978; font-size: 14px; }

    table { width: 100%; border-collapse: collapse; }

    th {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 4px 6px;
      text-align: left;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border);
    }

    th.c, td.c { text-align: center; }
    td { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .match-scroll, .third-scroll { flex: 1; min-height: 0; overflow: hidden; }

    .match-row { cursor: pointer; transition: background 0.15s; }
    .match-row:hover td { background: rgba(255,255,255,0.04); }
    .match-row.live td { background: rgba(76,201,120,0.07); }
    .match-row.past td { opacity: 0.55; }
    .match-row.past .fixture { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.25); }

    .time { font-weight: 700; color: var(--accent); white-space: nowrap; font-size: 16px; }
    .cd { font-weight: 400; color: var(--muted); font-size: 14px; }
    .live-txt { color: #4cc978; font-size: 14px; font-weight: 700; }
    .past-txt { color: var(--muted); font-size: 13px; font-weight: 600; text-transform: uppercase; }

    .grp {
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      min-width: 18px;
      text-align: center;
    }

    .group-A { background:#006847; color:#c8f7dc; }
    .group-B { background:#c1121f; color:#ffe0e0; }
    .group-C { background:#0077b6; color:#caf0f8; }
    .group-D { background:#7b2cbf; color:#e0aaff; }
    .group-E { background:#bc6c25; color:#fefae0; }
    .group-F { background:#e85d04; color:#fff1e6; }
    .group-G { background:#2d6a4f; color:#b7e4c7; }
    .group-H { background:#1d3557; color:#a8dadc; }
    .group-I { background:#6a0572; color:#f0c6ff; }
    .group-J { background:#bc4749; color:#ffe8e8; }
    .group-K { background:#e76f51; color:#fff3ed; }
    .group-L { background:#3a5a40; color:#d8f3dc; }

    .fixture { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .score { font-weight: 700; font-size: 16px; white-space: nowrap; }
    .score.live-score { color: #4cc978; }
    .score.final-score { color: var(--text); }
    .score .min { font-size: 13px; font-weight: 600; opacity: 0.85; }
    .score.tiny { font-size: 13px; }

    .tv { font-size: 14px; font-weight: 700; padding: 2px 5px; border-radius: 3px; white-space: nowrap; }
    .tv-orf { background:rgba(200,16,46,0.2); color:#ff8fa3; }
    .tv-servus { background:rgba(0,120,200,0.18); color:#7ec8ff; }

    .date-row td {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 6px 2px;
      background: rgba(0,0,0,0.12);
      border-bottom: none;
    }

    .third-panel .panel-head { font-size: 16px; padding: 7px 12px; }
    .third-panel th { font-size: 15px; padding: 6px 10px; }
    .third-panel td { font-size: 16px; padding: 5px 10px; }
    .third-panel .t-team { font-size: 16px; max-width: 140px; }
    .third-panel .t-grp { font-size: 14px; }

    .third-scroll tr.qualified td { background: rgba(76,201,120,0.06); }
    .third-scroll tr.cutline td { border-bottom: 2px solid rgba(212,175,55,0.45); }
    .third-scroll tr.out td { opacity: 0.45; }

    .t-team { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-grp { opacity: 0.65; }

    footer { flex-shrink: 0; font-size: 14px; color: var(--muted); text-align: center; opacity: 0.6; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #0f2619;
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 520px;
      width: 100%;
      max-height: 90dvh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .modal-head h2 { font-size: 17px; font-weight: 700; line-height: 1.3; }
    .modal-head .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .modal-close {
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
    }

    .modal-body { padding: 14px 16px 16px; }

    .modal-score {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .team-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .team-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
    }

    .team-card h3 { font-size: 15px; margin-bottom: 6px; }
    .team-card .map {
      width: 100%;
      height: 80px;
      border-radius: 6px;
      margin-top: 8px;
      object-fit: cover;
      background: #1a3a28;
    }

    .team-card dl { display: grid; grid-template-columns: auto 1fr; gap: 2px 8px; margin-top: 6px; }
    .team-card dt { color: var(--muted); }
    .team-card dd { font-weight: 600; }

    .counter-modal { max-width: 640px; }
    .counter-modal h2 { font-size: 16px; color: var(--accent); }

    .counter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .counter-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
    }

    .counter-item .val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .counter-item .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

    .counter-section {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .counter-hint {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      html, body { height: auto; min-height: 100dvh; overflow-x: hidden; overflow-y: auto; }
      .page { height: auto; min-height: 100dvh; padding: 10px 12px 12px; gap: 10px; }
      .grid { flex: none; display: flex; flex-direction: column; gap: 10px; }
      .panel { flex: none; min-height: auto; }
      .match-scroll, .third-scroll { flex: none; overflow: visible; }
      .title { font-size: 18px; white-space: normal; }
      .fixture { font-size: 15px; white-space: normal; line-height: 1.3; }
      .matches-table th, .matches-table td { padding: 5px 4px; }
      .third-panel { width: 100%; }
      .third-panel .t-team { max-width: none; }
      .team-cards { grid-template-columns: 1fr; }
      .counter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      '760479': { homeKey:'uruguay', awayKey:'spanien', group:'H', broadcaster:'ORF', espnHome:true, start:'2026-06-27T02:00:00+02:00' },
      '760476': { homeKey:'aegypten', awayKey:'iran', group:'G', broadcaster:'ServusTV', espnHome:true, start:'2026-06-27T05:00:00+02:00' },
      '760477': { homeKey:'neuseeland', awayKey:'belgien', group:'G', broadcaster:'ORF', espnHome:true, start:'2026-06-27T05:00:00+02:00' },
      '760480': { homeKey:'kroatien', awayKey:'ghana', group:'L', broadcaster:'ServusTV', espnHome:true, start:'2026-06-27T23:00:00+02:00' },
      '760485': { homeKey:'panama', awayKey:'england', group:'L', broadcaster:'ORF', espnHome:true, start:'2026-06-27T23:00:00+02:00' },
      '760481': { homeKey:'kolumbien', awayKey:'portugal', group:'K', broadcaster:'ServusTV', espnHome:true, start:'2026-06-28T01:30:00+02:00' },
      '760482': { homeKey:'drkongo', awayKey:'usbekistan', group:'K', broadcaster:'ORF', espnHome:true, start:'2026-06-28T01:30:00+02:00' },
      '760484': { homeKey:'algerien', awayKey:'oesterreich', group:'J', broadcaster:'ORF', espnHome:true, start:'2026-06-28T04:00:00+02:00' },
      '760483': { homeKey:'jordanien', awayKey:'argentinien', group:'J', broadcaster:'ServusTV', espnHome:true, start:'2026-06-28T04:00:00+02:00' },
      '760486': { homeKey:'suedafrika', awayKey:'kanada', group:'B', broadcaster:'ServusTV', espnHome:true, start:'2026-06-28T21:00:00+02:00' },
      '760468': { homeKey:'ecuador', awayKey:'deutschland', group:'E', broadcaster:'ORF', espnHome:true, start:'2026-06-26T00:00:00+02:00' },
      '760471': { homeKey:'japan', awayKey:'schweden', group:'F', broadcaster:'ORF', espnHome:true, start:'2026-06-26T01:00:00+02:00' },
    };

    const TEAM_META = {
      Mexico:['Mexiko','🇲🇽','mexiko'], 'South Korea':['Südkorea','🇰🇷','suedkorea'],
      'South Africa':['Südafrika','🇿🇦','suedafrika'], 'Bosnia and Herzegovina':['Bosnien-Herz.','🇧🇦','bosnien'],
      'Bosnia-Herzegovina':['Bosnien-Herz.','🇧🇦','bosnien'], Scotland:['Schottland','🏴','schottland'],
      Ecuador:['Ecuador','🇪🇨','ecuador'], Sweden:['Schweden','🇸🇪','schweden'],
      Paraguay:['Paraguay','🇵🇾','paraguay'], Croatia:['Kroatien','🇭🇷','kroatien'],
      Algeria:['Algerien','🇩🇿','algerien'], 'Cape Verde':['Kap Verde','🇨🇻','kapverde'],
      Belgium:['Belgien','🇧🇪','belgien'], 'DR Congo':['DR Kongo','🇨🇩','drkongo'],
      'Congo DR':['DR Kongo','🇨🇩','drkongo'], Senegal:['Senegal','🇸🇳','senegal'],
    };

    const CLINCHED = new Set(['Sweden','Ecuador','Bosnia and Herzegovina','Bosnia-Herzegovina']);

    let liveScores = {};
    let groupLive = {};
    let thirdPlaceData = null;
    let allEvents = [];
    let lastFetch = null;
    let refreshCount = 0;
    let pageStart = Date.now();
    let secretClicks = 0;
    let secretTimer = null;

    function c(key) { return COUNTRIES[key] || { name:key, flag:'', pop:0, capital:'–', continent:'–', lat:20, lng:0, area:'–', conf:'–' }; }

    function matchFromLookup(id, meta) {
      const home = c(meta.homeKey);
      const away = c(meta.awayKey);
      return {
        espnId: id,
        home: home.name, away: away.name,
        homeFlag: home.flag, awayFlag: away.flag,
        homeKey: meta.homeKey, awayKey: meta.awayKey,
        group: meta.group,
        broadcaster: meta.broadcaster,
        espnHome: meta.espnHome,
        start: meta.start,
        startDate: new Date(meta.start),
      };
    }

    const DISPLAY_MATCHES = Object.entries(MATCH_LOOKUP).map(([id, m]) => matchFromLookup(id, m));

    function formatTime(date) {
      return new Intl.DateTimeFormat('de-DE', { timeZone: tz, hour: '2-digit', minute: '2-digit' }).format(date);
    }

    function formatDateShort(date) {
      const now = new Date();
      const today = new Date(now.toLocaleString('en-US', { timeZone: tz }));
      today.setHours(0, 0, 0, 0);
      const matchDay = new Date(date.toLocaleString('en-US', { timeZone: tz }));
      matchDay.setHours(0, 0, 0, 0);
      const diff = (matchDay - today) / 86400000;
      if (diff === 0) return 'Heute';
      if (diff === 1) return 'Morgen';
      if (diff === -1) return 'Gestern';
      return new Intl.DateTimeFormat('de-DE', { timeZone: tz, weekday: 'short', day: 'numeric', month: 'short' }).format(date);
    }

    function formatCountdown(ms) {
      if (ms <= 0) return '';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      if (h > 0) return `${h}h${m > 0 ? m : ''}`;
      return `${m}m`;
    }

    function espnDateParam(date) {
      const p = new Intl.DateTimeFormat('en-CA', { timeZone: 'UTC', year: 'numeric', month: '2-digit', day: '2-digit' }).format(date);
      return p.replace(/-/g, '');
    }

    function getDateRange() {
      const now = new Date();
      const dates = new Set();
      for (let i = -2; i <= 5; i++) {
        const d = new Date(now);
        d.setUTCDate(d.getUTCDate() + i);
        dates.add(espnDateParam(d));
      }
      DISPLAY_MATCHES.forEach(m => dates.add(espnDateParam(new Date(m.start))));
      return [...dates];
    }

    function mapUrl(lat, lng) {
      return `https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lng}&zoom=4&size=300x100&markers=${lat},${lng},red`;
    }

    async function fetchLiveData() {
      const dates = getDateRange();
      const scoreMap = {};
      const gLive = {};
      const events = [];

      await Promise.all(dates.map(async (d) => {
        try {
          const res = await fetch(`${ESPN_SCORE}?dates=${d}`);
          const data = await res.json();
          for (const e of data.events || []) {
            const c = e.competitions[0];
            const st = c.status;
            const comps = c.competitors;
            const home = comps.find(x => x.homeAway === 'home');
            const away = comps.find(x => x.homeAway === 'away');
            const lookup = MATCH_LOOKUP[e.id];
            const group = lookup?.group;

            const entry = {
              id: e.id,
              homeScore: home?.score ?? '0',
              awayScore: away?.score ?? '0',
              state: st.type.state,
              description: st.type.description,
              clock: st.displayClock || '',
              period: st.period || 0,
              venue: c.venue?.fullName || '',
              venueCity: c.venue?.address?.city || '',
              homeEn: home?.team?.displayName || '',
              awayEn: away?.team?.displayName || '',
              homeAbbr: home?.team?.abbreviation || '',
              awayAbbr: away?.team?.abbreviation || '',
              date: e.date,
              group,
            };
            scoreMap[e.id] = entry;
            events.push(entry);

            if (group && st.type.state === 'in') {
              gLive[group] = {
                homeScore: entry.homeScore,
                awayScore: entry.awayScore,
                clock: entry.clock,
                label: `${entry.homeAbbr} ${entry.homeScore}:${entry.awayScore} ${entry.awayAbbr}`,
              };
            }
          }
        } catch (_) {}
      }));

      liveScores = scoreMap;
      groupLive = gLive;
      allEvents = events;

      try {
        const res = await fetch(ESPN_STANDINGS);
        const data = await res.json();
        const third = [];
        for (const g of data.children || []) {
          const group = g.abbreviation.replace('Group ', '');
          for (const e of g.standings?.entries || []) {
            const stats = Object.fromEntries(e.stats.map(s => [s.abbreviation, s]));
            if (parseInt(stats.R?.displayValue, 10) !== 3) continue;
            const en = e.team.displayName;
            const meta = TEAM_META[en] || [en, '', ESPN_TO_KEY[en] || ''];
            const gdRaw = stats.GD?.displayValue || '0';
            third.push({
              team: meta[0], flag: meta[1], key: meta[2], group,
              pts: parseInt(stats.P?.displayValue, 10) || 0,
              gd: parseInt(gdRaw.replace('+', ''), 10) || 0,
              played: parseInt(stats.GP?.displayValue, 10) || 0,
              qualified: CLINCHED.has(en),
              final: (parseInt(stats.GP?.displayValue, 10) || 0) >= 3,
            });
          }
        }
        third.sort((a, b) => b.pts - a.pts || b.gd - a.gd);
        thirdPlaceData = third;
      } catch (_) {}

      lastFetch = new Date();
      refreshCount++;
    }

    function isMatchVisible(m, now) {
      const s = liveScores[m.espnId];
      if (s?.state === 'in') return true;
      if (!s || s.state === 'pre') return m.startDate.getTime() + MATCH_DURATION_MS > now.getTime();
      if (s.state === 'post') {
        const end = m.startDate.getTime() + MATCH_DURATION_MS;
        return end + FINISHED_VISIBLE_MS > now.getTime();
      }
      return m.startDate.getTime() + MATCH_DURATION_MS > now.getTime();
    }

    function getScoreHtml(match, tiny = false) {
      const s = liveScores[match.espnId];
      if (!s || s.state === 'pre') return '<span class="score" style="color:var(--muted)">–</span>';
      const hs = match.espnHome ? s.homeScore : s.awayScore;
      const as = match.espnHome ? s.awayScore : s.homeScore;
      const score = `${hs}:${as}`;
      const cls = tiny ? 'score tiny' : 'score';
      if (s.state === 'in') {
        const min = s.clock ? `${s.clock}'` : 'LIVE';
        return `<span class="${cls} live-score">${score} <span class="min">${min}</span></span>`;
      }
      if (s.state === 'post') return `<span class="${cls} final-score">${score}</span>`;
      return `<span class="${cls}">${score}</span>`;
    }

    function getRowClass(match, now) {
      const s = liveScores[match.espnId];
      if (s?.state === 'in') return ' live';
      if (s?.state === 'post') return ' past';
      return '';
    }

    function renderMatches() {
      const now = new Date();
      const visible = DISPLAY_MATCHES
        .filter(m => isMatchVisible(m, now))
        .sort((a, b) => {
          const sa = liveScores[a.espnId]?.state;
          const sb = liveScores[b.espnId]?.state;
          if (sa === 'in' && sb !== 'in') return -1;
          if (sb === 'in' && sa !== 'in') return 1;
          if (sa === 'post' && sb !== 'post') return 1;
          if (sb === 'post' && sa !== 'post') return -1;
          return a.startDate - b.startDate;
        });

      const tbody = document.getElementById('matches');
      if (!visible.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:8px">Keine Spiele</td></tr>';
        return;
      }

      let html = '';
      let lastDate = '';

      for (const m of visible) {
        const dateKey = formatDateShort(m.startDate);
        if (dateKey !== lastDate) {
          html += `<tr class="date-row"><td colspan="5">${dateKey}</td></tr>`;
          lastDate = dateKey;
        }

        const s = liveScores[m.espnId];
        const live = s?.state === 'in';
        const past = s?.state === 'post';
        const cd = (!live && !past) ? formatCountdown(m.startDate - now) : '';
        const tvClass = m.broadcaster === 'ORF' ? 'tv-orf' : 'tv-servus';

        let timeCell;
        if (live) timeCell = '<span class="live-txt">LIVE</span>';
        else if (past) timeCell = '<span class="past-txt">Beendet</span>';
        else timeCell = `${formatTime(m.startDate)}${cd ? `<br><span class="cd">${cd}</span>` : ''}`;

        html += `
          <tr class="match-row${getRowClass(m, now)}" data-espn="${m.espnId}">
            <td class="time">${timeCell}</td>
            <td class="c"><span class="grp group-${m.group}">${m.group}</span></td>
            <td class="fixture">${m.homeFlag} ${m.home} – ${m.away} ${m.awayFlag}</td>
            <td class="c">${getScoreHtml(m)}</td>
            <td class="c"><span class="tv ${tvClass}">${m.broadcaster === 'ORF' ? 'ORF' : 'Servus'}</span></td>
          </tr>`;
      }

      tbody.innerHTML = html;
    }

    function getGroupLiveHtml(group) {
      const g = groupLive[group];
      if (!g) return '<span style="color:var(--muted);font-size:12px">–</span>';
      return `<span class="score tiny live-score">${g.label} <span class="min">${g.clock}'</span></span>`;
    }

    function renderThirdPlace() {
      const tbody = document.getElementById('third-place-body');
      if (!thirdPlaceData?.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted)">Laden…</td></tr>';
        return;
      }

      tbody.innerHTML = thirdPlaceData.map((t, i) => {
        const rank = i + 1;
        let cls = '';
        if (t.qualified) cls = 'qualified';
        else if (rank <= 8) cls = rank === 8 ? 'qualified cutline' : 'qualified';
        else cls = 'out';

        return `
          <tr class="${cls}">
            <td class="c">${rank}</td>
            <td class="t-team">${t.flag} ${t.team}<span class="t-grp"> ${t.group}${t.final ? '' : '*'}</span></td>
            <td class="c">${t.pts}</td>
            <td class="c">${t.gd > 0 ? '+' + t.gd : t.gd}</td>
            <td class="c">${getGroupLiveHtml(t.group)}</td>
          </tr>`;
      }).join('');
    }

    function openMatchModal(espnId) {
      const m = DISPLAY_MATCHES.find(x => x.espnId === espnId);
      if (!m) return;
      const s = liveScores[espnId] || {};
      const home = c(m.homeKey);
      const away = c(m.awayKey);

      document.getElementById('modal-title').textContent = `${home.flag} ${home.name} – ${away.name} ${away.flag}`;
      document.getElementById('modal-meta').textContent =
        `Gruppe ${m.group} · ${formatTime(m.startDate)} MEZ · ${s.venue || 'Stadion'} · ${m.broadcaster}`;

      let scoreText = '– : –';
      if (s.state === 'in' || s.state === 'post') {
        const hs = m.espnHome ? s.homeScore : s.awayScore;
        const as = m.espnHome ? s.awayScore : s.homeScore;
        scoreText = `${hs} : ${as}`;
        if (s.state === 'in') scoreText += `  (${s.clock || 'LIVE'}')`;
        if (s.state === 'post') scoreText += '  · Endstand';
      } else {
        scoreText = `Anstoß ${formatTime(m.startDate)} MEZ`;
      }
      document.getElementById('modal-score').textContent = scoreText;

      function teamCard(team) {
        return `
          <div class="team-card">
            <h3>${team.flag} ${team.name}</h3>
            <dl>
              <dt>Einwohner</dt><dd>ca. ${team.pop} Mio.</dd>
              <dt>Hauptstadt</dt><dd>${team.capital}</dd>
              <dt>Kontinent</dt><dd>${team.continent}</dd>
              <dt>Fläche</dt><dd>${team.area}</dd>
              <dt>Verband</dt><dd>${team.conf}</dd>
            </dl>
            <img class="map" src="${mapUrl(team.lat, team.lng)}" alt="Karte ${team.name}" loading="lazy">
          </div>`;
      }

      document.getElementById('modal-teams').innerHTML = teamCard(home) + teamCard(away);
      document.getElementById('match-overlay').classList.add('open');
    }

    function computeCounterStats() {
      const now = Date.now();
      let totalGoals = 0, matchesDone = 0, matchesLive = 0, matchesUpcoming = 0, goalsToday = 0;
      const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: tz }).format(new Date());

      for (const e of allEvents) {
        const hs = parseInt(e.homeScore, 10) || 0;
        const as = parseInt(e.awayScore, 10) || 0;
        if (e.state === 'post') { totalGoals += hs + as; matchesDone++; }
        if (e.state === 'in') { totalGoals += hs + as; matchesLive++; }
        if (e.state === 'pre') matchesUpcoming++;
        const evDay = new Intl.DateTimeFormat('en-CA', { timeZone: tz }).format(new Date(e.date));
        if (evDay === todayStr && e.state === 'post') goalsToday += hs + as;
      }

      const groupsOpen = thirdPlaceData ? thirdPlaceData.filter(t => !t.final).length : 0;
      const inZone = thirdPlaceData ? thirdPlaceData.filter((_, i) => i < 8).length : 0;
      const nextMatch = DISPLAY_MATCHES
        .filter(m => liveScores[m.espnId]?.state !== 'post' && m.startDate > new Date())
        .sort((a, b) => a.startDate - b.startDate)[0];

      const austriaMatch = DISPLAY_MATCHES.find(m => m.homeKey === 'oesterreich' || m.awayKey === 'oesterreich');
      const uptimeMin = Math.floor((now - pageStart) / 60000);

      return {
        totalGoals, matchesDone, matchesLive, matchesUpcoming,
        goalsToday, groupsOpen, inZone,
        totalWMMatches: 104,
        progress: Math.round((matchesDone / 104) * 100),
        avgGoals: matchesDone ? (totalGoals / matchesDone).toFixed(2) : '0',
        liveGroups: Object.keys(groupLive).length,
        thirdTeams: thirdPlaceData?.length || 0,
        refreshCount, uptimeMin,
        nextMatch: nextMatch ? `${nextMatch.home} – ${nextMatch.away} in ${formatCountdown(nextMatch.startDate - new Date())}` : '–',
        austria: austriaMatch ? `${austriaMatch.home} vs ${austriaMatch.away} · ${formatTime(austriaMatch.startDate)} MEZ` : '–',
        popPlaying: DISPLAY_MATCHES.filter(m => liveScores[m.espnId]?.state === 'in')
          .reduce((s, m) => s + c(m.homeKey).pop + c(m.awayKey).pop, 0).toFixed(1),
      };
    }

    function openCounter() {
      const s = computeCounterStats();
      document.getElementById('counter-body').innerHTML = `
        <div class="counter-grid">
          <div class="counter-item"><div class="val">${s.totalGoals}</div><div class="lbl">Tore gesamt (API)</div></div>
          <div class="counter-item"><div class="val">${s.goalsToday}</div><div class="lbl">Tore heute</div></div>
          <div class="counter-item"><div class="val">${s.matchesDone}</div><div class="lbl">Spiele beendet</div></div>
          <div class="counter-item"><div class="val">${s.matchesLive}</div><div class="lbl">Spiele live</div></div>
          <div class="counter-item"><div class="val">${s.matchesUpcoming}</div><div class="lbl">Spiele offen (API)</div></div>
          <div class="counter-item"><div class="val">${s.progress}%</div><div class="lbl">Turnier-Fortschritt</div></div>
          <div class="counter-item"><div class="val">${s.avgGoals}</div><div class="lbl">Ø Tore / Spiel</div></div>
          <div class="counter-item"><div class="val">${s.liveGroups}</div><div class="lbl">Gruppen mit Live-Spiel</div></div>
          <div class="counter-item"><div class="val">${s.thirdTeams}</div><div class="lbl">Drittplatzierte</div></div>
          <div class="counter-item"><div class="val">${s.inZone}</div><div class="lbl">In Top-8-Zone</div></div>
          <div class="counter-item"><div class="val">${s.groupsOpen}</div><div class="lbl">Offene Gruppen (*)</div></div>
          <div class="counter-item"><div class="val">${s.popPlaying}M</div><div class="lbl">Einw. bei Live-Spielen</div></div>
          <div class="counter-item"><div class="val">${s.refreshCount}</div><div class="lbl">API-Aktualisierungen</div></div>
          <div class="counter-item"><div class="val">${s.uptimeMin}m</div><div class="lbl">Seiten-Laufzeit</div></div>
        </div>
        <div class="counter-section">Nächstes Spiel</div>
        <p style="margin-top:6px;font-size:14px">${s.nextMatch}</p>
        <div class="counter-section">Österreich</div>
        <p style="margin-top:6px;font-size:14px">${s.austria}</p>
        <div class="counter-section">Live-Gruppen</div>
        <p style="margin-top:6px;font-size:13px;color:var(--muted)">${Object.entries(groupLive).map(([g,v]) => `Gr. ${g}: ${v.label} (${v.clock}')`).join(' · ') || 'Keine Live-Spiele'}</p>
      `;
      document.getElementById('counter-overlay').classList.add('open');
    }

    function updateFooter() {
      const el = document.getElementById('footer-note');
      if (lastFetch) el.textContent = `Live · ${formatTime(lastFetch)} MEZ · Tippen für Details · * offen`;
    }

    async function refresh() {
      await fetchLiveData();
      renderMatches();
      renderThirdPlace();
      updateFooter();
      if (document.getElementById('counter-overlay').classList.contains('open')) openCounter();
    }

    document.getElementById('matches').addEventListener('click', (e) => {
      const row = e.target.closest('[data-espn]');
      if (row) openMatchModal(row.dataset.espn);
    });

    document.getElementById('modal-close').onclick = () => document.getElementById('match-overlay').classList.remove('open');
    document.getElementById('match-overlay').onclick = (e) => { if (e.target.id === 'match-overlay') e.target.classList.remove('open'); };
    document.getElementById('counter-close').onclick = () => document.getElementById('counter-overlay').classList.remove('open');
    document.getElementById('counter-overlay').onclick = (e) => { if (e.target.id === 'counter-overlay') e.target.classList.remove('open'); };

    document.getElementById('secret-trigger').addEventListener('click', () => {
      secretClicks++;
      clearTimeout(secretTimer);
      secretTimer = setTimeout(() => { secretClicks = 0; }, 2000);
      if (secretClicks >= 5) { secretClicks = 0; openCounter(); }
    });

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
