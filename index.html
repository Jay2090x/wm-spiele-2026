<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM 2026 – Nächste Spiele</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a1f14;
      --card: rgba(255,255,255,0.05);
      --accent: #d4af37;
      --text: #f0f4f0;
      --muted: #8fa899;
      --border: rgba(255,255,255,0.09);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(26,77,50,0.5), transparent);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px 10px 6px;
      gap: 6px;
      max-width: 1150px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    .title span { color: var(--accent); }

    .mez {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(212,175,55,0.15);
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 290px;
      gap: 8px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-head {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      padding: 5px 10px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-head .pill {
      float: right;
      color: #4cc978;
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 4px 6px;
      text-align: left;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border);
    }

    th.c, td.c { text-align: center; }

    td {
      padding: 3px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    .match-scroll, .third-scroll {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .match-row.live td { background: rgba(76,201,120,0.07); }
    .match-row.finished td { background: rgba(255,255,255,0.03); }

    .time { font-weight: 700; color: var(--accent); white-space: nowrap; font-size: 14px; }
    .cd { font-weight: 400; color: var(--muted); font-size: 12px; }
    .live-txt { color: #4cc978; font-size: 12px; font-weight: 700; }

    .grp {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      min-width: 18px;
      text-align: center;
    }

    .group-A { background:#006847; color:#c8f7dc; }
    .group-B { background:#c1121f; color:#ffe0e0; }
    .group-C { background:#0077b6; color:#caf0f8; }
    .group-D { background:#7b2cbf; color:#e0aaff; }
    .group-E { background:#bc6c25; color:#fefae0; }
    .group-F { background:#e85d04; color:#fff1e6; }
    .group-G { background:#2d6a4f; color:#b7e4c7; }
    .group-H { background:#1d3557; color:#a8dadc; }
    .group-I { background:#6a0572; color:#f0c6ff; }
    .group-J { background:#bc4749; color:#ffe8e8; }
    .group-K { background:#e76f51; color:#fff3ed; }
    .group-L { background:#3a5a40; color:#d8f3dc; }

    .fixture {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .score.live-score { color: #4cc978; }
    .score.final-score { color: var(--text); }
    .score .min { font-size: 11px; font-weight: 600; opacity: 0.85; }

    .tv {
      font-size: 12px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .tv-orf { background:rgba(200,16,46,0.2); color:#ff8fa3; }
    .tv-servus { background:rgba(0,120,200,0.18); color:#7ec8ff; }

    .date-row td {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 6px 2px;
      background: rgba(0,0,0,0.12);
      border-bottom: none;
    }

    .third-panel .panel-head { font-size: 14px; padding: 6px 10px; }
    .third-panel th { font-size: 13px; padding: 5px 8px; }
    .third-panel td { font-size: 14px; padding: 4px 8px; }
    .third-panel .t-team { font-size: 14px; max-width: 150px; }
    .third-panel .t-grp { font-size: 12px; }

    .third-scroll tr.qualified td { background: rgba(76,201,120,0.06); }
    .third-scroll tr.cutline td { border-bottom: 2px solid rgba(212,175,55,0.45); }
    .third-scroll tr.out td { opacity: 0.45; }

    .t-team { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-grp { opacity: 0.65; }

    footer {
      flex-shrink: 0;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      html, body {
        height: auto;
        min-height: 100dvh;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .page {
        height: auto;
        min-height: 100dvh;
        padding: 10px 12px 12px;
        gap: 10px;
      }

      .grid {
        flex: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .panel {
        flex: none;
        min-height: auto;
      }

      .match-scroll,
      .third-scroll {
        flex: none;
        overflow: visible;
      }

      .title {
        font-size: 16px;
        white-space: normal;
      }

      .fixture {
        font-size: 13px;
        white-space: normal;
        line-height: 1.3;
      }

      .matches-table th,
      .matches-table td {
        padding: 5px 4px;
      }

      .matches-table th:nth-child(1),
      .matches-table td:nth-child(1) { width: 54px; }
      .matches-table th:nth-child(2),
      .matches-table td:nth-child(2) { width: 30px; }
      .matches-table th:nth-child(4),
      .matches-table td:nth-child(4) { width: 52px; }
      .matches-table th:nth-child(5),
      .matches-table td:nth-child(5) { width: 46px; }

      .third-panel {
        width: 100%;
      }

      .third-panel .t-team {
        max-width: none;
        font-size: 14px;
      }

      .third-panel td,
      .third-panel th {
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="title">🏆 <span>WM 2026</span> · Nächste Spiele</div>
      <div class="mez">MEZ · Live</div>
    </header>

    <div class="grid">
      <section class="panel matches-panel">
        <div class="panel-head">Anstehende Spiele</div>
        <div class="match-scroll">
          <table class="matches-table">
            <thead>
              <tr>
                <th>Zeit</th>
                <th class="c">Gr</th>
                <th>Spiel</th>
                <th class="c">Res</th>
                <th class="c">TV</th>
              </tr>
            </thead>
            <tbody id="matches"></tbody>
          </table>
        </div>
      </section>

      <section class="panel third-panel">
        <div class="panel-head">3. Plätze <span class="pill">Top 8 →</span></div>
        <div class="third-scroll">
          <table>
            <thead>
              <tr>
                <th class="c">#</th>
                <th>Team</th>
                <th class="c">P</th>
                <th class="c">TD</th>
              </tr>
            </thead>
            <tbody id="third-place-body"></tbody>
          </table>
        </div>
      </section>
    </div>

    <footer id="footer-note">Live-Daten · * Gruppe offen</footer>
  </div>

  <script>
    const ESPN_SCORE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
    const ESPN_STANDINGS = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings';

    const MATCHES = [
      { home: 'Norwegen', away: 'Frankreich', homeFlag: '🇳🇴', awayFlag: '🇫🇷', group: 'I', broadcaster: 'ServusTV', espnId: '760475', espnHome: true, start: '2026-06-26T21:00:00+02:00' },
      { home: 'Senegal', away: 'Irak', homeFlag: '🇸🇳', awayFlag: '🇮🇶', group: 'I', broadcaster: 'ORF', espnId: '760474', espnHome: true, start: '2026-06-26T21:00:00+02:00' },
      { home: 'Kroatien', away: 'Ghana', homeFlag: '🇭🇷', awayFlag: '🇬🇭', group: 'L', broadcaster: 'ServusTV', espnId: '760480', espnHome: true, start: '2026-06-27T23:00:00+02:00' },
      { home: 'Kap Verde', away: 'Saudi-Arabien', homeFlag: '🇨🇻', awayFlag: '🇸🇦', group: 'H', broadcaster: 'ServusTV', espnId: '760478', espnHome: true, start: '2026-06-27T02:00:00+02:00' },
      { home: 'Uruguay', away: 'Spanien', homeFlag: '🇺🇾', awayFlag: '🇪🇸', group: 'H', broadcaster: 'ORF', espnId: '760479', espnHome: true, start: '2026-06-27T02:00:00+02:00' },
      { home: 'Ägypten', away: 'Iran', homeFlag: '🇪🇬', awayFlag: '🇮🇷', group: 'G', broadcaster: 'ServusTV', espnId: '760476', espnHome: true, start: '2026-06-27T05:00:00+02:00' },
      { home: 'Neuseeland', away: 'Belgien', homeFlag: '🇳🇿', awayFlag: '🇧🇪', group: 'G', broadcaster: 'ORF', espnId: '760477', espnHome: true, start: '2026-06-27T05:00:00+02:00' },
      { home: 'Panama', away: 'England', homeFlag: '🇵🇦', awayFlag: '🏴', group: 'L', broadcaster: 'ORF', espnId: '760485', espnHome: true, start: '2026-06-27T23:00:00+02:00' },
      { home: 'Kolumbien', away: 'Portugal', homeFlag: '🇨🇴', awayFlag: '🇵🇹', group: 'K', broadcaster: 'ServusTV', espnId: '760481', espnHome: true, start: '2026-06-28T01:30:00+02:00' },
      { home: 'DR Kongo', away: 'Usbekistan', homeFlag: '🇨🇩', awayFlag: '🇺🇿', group: 'K', broadcaster: 'ORF', espnId: '760482', espnHome: true, start: '2026-06-28T01:30:00+02:00' },
      { home: 'Algerien', away: 'Österreich', homeFlag: '🇩🇿', awayFlag: '🇦🇹', group: 'J', broadcaster: 'ORF', espnId: '760484', espnHome: true, start: '2026-06-28T04:00:00+02:00' },
      { home: 'Jordanien', away: 'Argentinien', homeFlag: '🇯🇴', awayFlag: '🇦🇷', group: 'J', broadcaster: 'ServusTV', espnId: '760483', espnHome: true, start: '2026-06-28T04:00:00+02:00' },
      { home: 'Südafrika', away: 'Kanada', homeFlag: '🇿🇦', awayFlag: '🇨🇦', group: 'B', broadcaster: 'ServusTV', espnId: '760486', espnHome: true, start: '2026-06-28T21:00:00+02:00' },
    ];

    const TEAM_META = {
      'Mexico': ['Mexiko', '🇲🇽'], 'South Korea': ['Südkorea', '🇰🇷'], 'South Africa': ['Südafrika', '🇿🇦'],
      'Czechia': ['Tschechien', '🇨🇿'], 'Bosnia and Herzegovina': ['Bosnien-Herz.', '🇧🇦'],
      'Bosnia-Herzegovina': ['Bosnien-Herz.', '🇧🇦'], 'Scotland': ['Schottland', '🏴'],
      'Ecuador': ['Ecuador', '🇪🇨'], 'Sweden': ['Schweden', '🇸🇪'], 'Paraguay': ['Paraguay', '🇵🇾'],
      'Croatia': ['Kroatien', '🇭🇷'], 'Algeria': ['Algerien', '🇩🇿'], 'Cape Verde': ['Kap Verde', '🇨🇻'],
      'Belgium': ['Belgien', '🇧🇪'], 'DR Congo': ['DR Kongo', '🇨🇩'], 'Congo DR': ['DR Kongo', '🇨🇩'],
      'Senegal': ['Senegal', '🇸🇳'], 'Iran': ['Iran', '🇮🇷'], 'Uzbekistan': ['Usbekistan', '🇺🇿'],
      'Jordan': ['Jordanien', '🇯🇴'], 'Ghana': ['Ghana', '🇬🇭'], 'Panama': ['Panama', '🇵🇦'],
    };

    const CLINCHED = new Set(['Sweden', 'Ecuador', 'Bosnia and Herzegovina', 'Bosnia-Herzegovina']);

    let liveScores = {};
    let thirdPlaceData = null;
    let lastFetch = null;

    const MATCH_DURATION_MS = 2 * 60 * 60 * 1000;
    const tz = 'Europe/Berlin';

    function formatTime(date) {
      return new Intl.DateTimeFormat('de-DE', { timeZone: tz, hour: '2-digit', minute: '2-digit' }).format(date);
    }

    function formatDateShort(date) {
      const now = new Date();
      const today = new Date(now.toLocaleString('en-US', { timeZone: tz }));
      today.setHours(0, 0, 0, 0);
      const matchDay = new Date(date.toLocaleString('en-US', { timeZone: tz }));
      matchDay.setHours(0, 0, 0, 0);
      const diff = (matchDay - today) / 86400000;
      if (diff === 0) return 'Heute';
      if (diff === 1) return 'Morgen';
      return new Intl.DateTimeFormat('de-DE', { timeZone: tz, weekday: 'short', day: 'numeric', month: 'short' }).format(date);
    }

    function formatCountdown(ms) {
      if (ms <= 0) return '';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      if (h > 0) return `${h}h${m > 0 ? m : ''}`;
      return `${m}m`;
    }

    function espnDateParam(date) {
      const p = new Intl.DateTimeFormat('en-CA', { timeZone: 'UTC', year: 'numeric', month: '2-digit', day: '2-digit' }).format(date);
      return p.replace(/-/g, '');
    }

    async function fetchLiveData() {
      const dates = [...new Set(MATCHES.map(m => espnDateParam(new Date(m.start))))];
      const scoreMap = {};

      await Promise.all(dates.map(async (d) => {
        try {
          const res = await fetch(`${ESPN_SCORE}?dates=${d}`);
          const data = await res.json();
          for (const e of data.events || []) {
            const c = e.competitions[0];
            const st = c.status;
            const comps = c.competitors;
            const home = comps.find(x => x.homeAway === 'home');
            const away = comps.find(x => x.homeAway === 'away');
            scoreMap[e.id] = {
              homeScore: home?.score ?? '0',
              awayScore: away?.score ?? '0',
              state: st.type.state,
              description: st.type.description,
              clock: st.displayClock || '',
              period: st.period || 0,
            };
          }
        } catch (_) {}
      }));

      liveScores = scoreMap;

      try {
        const res = await fetch(ESPN_STANDINGS);
        const data = await res.json();
        const third = [];

        for (const g of data.children || []) {
          const group = g.abbreviation.replace('Group ', '');
          for (const e of g.standings?.entries || []) {
            const stats = Object.fromEntries(e.stats.map(s => [s.abbreviation, s]));
            const rank = parseInt(stats.R?.displayValue, 10);
            if (rank !== 3) continue;
            const en = e.team.displayName;
            const meta = TEAM_META[en] || [en, ''];
            const gdRaw = stats.GD?.displayValue || '0';
            const gd = parseInt(gdRaw.replace('+', ''), 10) || 0;
            third.push({
              team: meta[0],
              flag: meta[1],
              group,
              pts: parseInt(stats.P?.displayValue, 10) || 0,
              gd,
              played: parseInt(stats.GP?.displayValue, 10) || 0,
              qualified: CLINCHED.has(en),
              final: (parseInt(stats.GP?.displayValue, 10) || 0) >= 3,
            });
          }
        }

        third.sort((a, b) => b.pts - a.pts || b.gd - a.gd);
        thirdPlaceData = third;
      } catch (_) {}

      lastFetch = new Date();
    }

    function getScoreHtml(match) {
      const s = liveScores[match.espnId];
      if (!s || s.state === 'pre') return '<span class="score" style="color:var(--muted)">–</span>';

      const hs = match.espnHome ? s.homeScore : s.awayScore;
      const as = match.espnHome ? s.awayScore : s.homeScore;
      const score = `${hs}:${as}`;

      if (s.state === 'in') {
        const min = s.clock ? `${s.clock}'` : 'LIVE';
        return `<span class="score live-score">${score} <span class="min">${min}</span></span>`;
      }
      if (s.state === 'post') {
        return `<span class="score final-score">${score}</span>`;
      }
      return `<span class="score">${score}</span>`;
    }

    function getStatusClass(match, now) {
      const s = liveScores[match.espnId];
      if (s?.state === 'in') return ' live';
      if (s?.state === 'post') return ' finished';
      const start = new Date(match.start);
      if (now >= start.getTime() && now < start.getTime() + MATCH_DURATION_MS) return ' live';
      return '';
    }

    function renderMatches() {
      const now = new Date();
      const upcoming = MATCHES
        .map(m => ({ ...m, startDate: new Date(m.start) }))
        .filter(m => {
          const s = liveScores[m.espnId];
          if (s?.state === 'in') return true;
          return m.startDate.getTime() + MATCH_DURATION_MS > now.getTime();
        })
        .sort((a, b) => {
          const sa = liveScores[a.espnId]?.state === 'in' ? 0 : 1;
          const sb = liveScores[b.espnId]?.state === 'in' ? 0 : 1;
          if (sa !== sb) return sa - sb;
          return a.startDate - b.startDate;
        });

      const tbody = document.getElementById('matches');
      if (!upcoming.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:8px">Keine Spiele</td></tr>';
        return;
      }

      let html = '';
      let lastDate = '';

      for (const m of upcoming) {
        const dateKey = formatDateShort(m.startDate);
        if (dateKey !== lastDate) {
          html += `<tr class="date-row"><td colspan="5">${dateKey}</td></tr>`;
          lastDate = dateKey;
        }

        const s = liveScores[m.espnId];
        const live = s?.state === 'in';
        const finished = s?.state === 'post';
        const cd = (!live && !finished) ? formatCountdown(m.startDate - now) : '';
        const tvClass = m.broadcaster === 'ORF' ? 'tv-orf' : 'tv-servus';

        let timeCell;
        if (live) timeCell = '<span class="live-txt">LIVE</span>';
        else if (finished) timeCell = '<span class="cd">Ende</span>';
        else timeCell = `${formatTime(m.startDate)}${cd ? `<br><span class="cd">${cd}</span>` : ''}`;

        html += `
          <tr class="match-row${getStatusClass(m, now)}">
            <td class="time">${timeCell}</td>
            <td class="c"><span class="grp group-${m.group}">${m.group}</span></td>
            <td class="fixture">${m.homeFlag} ${m.home} – ${m.away} ${m.awayFlag}</td>
            <td class="c">${getScoreHtml(m)}</td>
            <td class="c"><span class="tv ${tvClass}">${m.broadcaster === 'ORF' ? 'ORF' : 'Servus'}</span></td>
          </tr>`;
      }

      tbody.innerHTML = html;
    }

    function formatGd(gd) {
      return gd > 0 ? `+${gd}` : `${gd}`;
    }

    function renderThirdPlace() {
      const data = thirdPlaceData;
      const tbody = document.getElementById('third-place-body');
      if (!data?.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted)">Laden…</td></tr>';
        return;
      }

      tbody.innerHTML = data.map((t, i) => {
        const rank = i + 1;
        let cls = '';
        if (t.qualified) cls = 'qualified';
        else if (rank <= 8) cls = rank === 8 ? 'qualified cutline' : 'qualified';
        else cls = 'out';

        return `
          <tr class="${cls}">
            <td class="c">${rank}</td>
            <td class="t-team">${t.flag} ${t.team}<span class="t-grp"> ${t.group}${t.final ? '' : '*'}</span></td>
            <td class="c">${t.pts}</td>
            <td class="c">${formatGd(t.gd)}</td>
          </tr>`;
      }).join('');
    }

    function updateFooter() {
      const el = document.getElementById('footer-note');
      if (lastFetch) {
        const t = formatTime(lastFetch);
        el.textContent = `Live · aktualisiert ${t} MEZ · * Gruppe offen`;
      }
    }

    async function refresh() {
      await fetchLiveData();
      renderMatches();
      renderThirdPlace();
      updateFooter();
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
