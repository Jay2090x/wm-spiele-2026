<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM 2026 – Nächste Spiele</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a1f14;
      --card: rgba(255,255,255,0.05);
      --accent: #d4af37;
      --text: #f0f4f0;
      --muted: #8fa899;
      --border: rgba(255,255,255,0.09);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100dvh; overflow: hidden; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.2;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(26,77,50,0.5), transparent);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px 10px 6px;
      gap: 6px;
      max-width: 1150px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
      cursor: default;
      user-select: none;
    }

    .title span { color: var(--accent); }

    .mez {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(212,175,55,0.15);
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 8px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-head {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      padding: 5px 10px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-head .pill { float: right; color: #4cc978; font-size: 14px; }

    table { width: 100%; border-collapse: collapse; }

    th {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 4px 6px;
      text-align: left;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border);
    }

    th.c, td.c { text-align: center; }
    td { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .match-scroll, .third-scroll { flex: 1; min-height: 0; overflow: hidden; }

    .match-row { cursor: pointer; transition: background 0.15s; }
    .match-row:hover td { background: rgba(255,255,255,0.04); }
    .match-row.live td { background: rgba(76,201,120,0.07); }
    .match-row.past td { opacity: 0.55; }
    .match-row.past .fixture { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.25); }
    .match-row.past + .match-row:not(.past) td { border-top: 1px solid rgba(255,255,255,0.1); }

    .time { font-weight: 700; color: var(--accent); white-space: nowrap; font-size: 16px; }
    .cd { font-weight: 400; color: var(--muted); font-size: 14px; }
    .live-txt { color: #4cc978; font-size: 14px; font-weight: 700; }
    .past-txt { color: var(--muted); font-size: 13px; font-weight: 600; text-transform: uppercase; }

    .grp {
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      min-width: 18px;
      text-align: center;
    }

    .group-A { background:#006847; color:#c8f7dc; }
    .group-B { background:#c1121f; color:#ffe0e0; }
    .group-C { background:#0077b6; color:#caf0f8; }
    .group-D { background:#7b2cbf; color:#e0aaff; }
    .group-E { background:#bc6c25; color:#fefae0; }
    .group-F { background:#e85d04; color:#fff1e6; }
    .group-G { background:#2d6a4f; color:#b7e4c7; }
    .group-H { background:#1d3557; color:#a8dadc; }
    .group-I { background:#6a0572; color:#f0c6ff; }
    .group-J { background:#bc4749; color:#ffe8e8; }
    .group-K { background:#e76f51; color:#fff3ed; }
    .group-L { background:#3a5a40; color:#d8f3dc; }

    .fixture { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .score { font-weight: 700; font-size: 16px; white-space: nowrap; }
    .score.live-score { color: #4cc978; }
    .score.final-score { color: var(--text); }
    .score .min { font-size: 13px; font-weight: 600; opacity: 0.85; }
    .score.tiny { font-size: 13px; }

    .tv { font-size: 14px; font-weight: 700; padding: 2px 5px; border-radius: 3px; white-space: nowrap; }
    .tv-orf { background:rgba(200,16,46,0.2); color:#ff8fa3; }
    .tv-servus { background:rgba(0,120,200,0.18); color:#7ec8ff; }

    .date-row td {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 6px 2px;
      background: rgba(0,0,0,0.12);
      border-bottom: none;
    }

    .third-panel .panel-head { font-size: 16px; padding: 7px 12px; }
    .third-panel th { font-size: 15px; padding: 6px 10px; }
    .third-panel td { font-size: 16px; padding: 5px 10px; }
    .third-panel .t-team { font-size: 16px; max-width: 140px; }
    .third-panel .t-grp { font-size: 14px; }

    .third-scroll tr.qualified td { background: rgba(76,201,120,0.06); }
    .third-scroll tr.cutline td { border-bottom: 2px solid rgba(212,175,55,0.45); }
    .third-scroll tr.out td { opacity: 0.45; }

    .t-team { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-grp { opacity: 0.65; }

    .stats-block {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 6px 8px 8px;
      background: rgba(0,0,0,0.12);
    }

    .stats-head {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .stat-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 6px;
    }

    .stat-item .val { font-size: 15px; font-weight: 700; color: var(--accent); line-height: 1.1; }
    .stat-item .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }

    footer { flex-shrink: 0; font-size: 14px; color: var(--muted); text-align: center; opacity: 0.6; cursor: default; user-select: none; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #0f2619;
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 520px;
      width: 100%;
      max-height: 90dvh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .modal-head h2 { font-size: 17px; font-weight: 700; line-height: 1.3; }
    .modal-head .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .modal-close {
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
    }

    .modal-body { padding: 14px 16px 16px; }

    .modal-score {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .team-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .team-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
    }

    .team-card-btn { cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .team-card-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(212,175,55,0.35); }
    .team-row { cursor: pointer; }
    .team-row:hover td { background: rgba(255,255,255,0.04); }

    .team-modal { max-width: 480px; }
    .team-section {
      margin-bottom: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .team-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 8px 10px;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border);
    }

    .group-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .group-table th { font-size: 11px; padding: 5px 6px; }
    .group-table td { padding: 4px 6px; }
    .group-table tr.highlight td { background: rgba(212,175,55,0.12); font-weight: 700; }
    .group-table .t-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

    .recent-list { list-style: none; font-size: 13px; }
    .recent-list li {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .recent-list li:last-child { border-bottom: none; }
    .recent-date { color: var(--muted); font-size: 11px; min-width: 52px; }
    .recent-score { font-weight: 700; color: var(--accent); white-space: nowrap; }
    .recent-live { color: #4cc978; font-size: 11px; font-weight: 700; }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    .team-card h3 { font-size: 15px; margin-bottom: 6px; }
    .team-card .country-img {
      width: 100%;
      height: 72px;
      border-radius: 6px;
      margin-top: 8px;
      object-fit: contain;
      padding: 6px;
      background: #1a3a28;
    }

    .team-card .flag-fallback {
      width: 100%;
      height: 72px;
      border-radius: 6px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      line-height: 1;
      background: #1a3a28;
    }

    .team-card dl { display: grid; grid-template-columns: auto 1fr; gap: 2px 8px; margin-top: 6px; }
    .team-card dt { color: var(--muted); }
    .team-card dd { font-weight: 600; }

    .venue-block {
      margin-bottom: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .stadium-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
      background: #1a3a28;
    }

    .venue-info { padding: 10px 12px; font-size: 13px; line-height: 1.35; }
    .venue-info strong { display: block; font-size: 15px; margin-bottom: 3px; }
    .venue-info .loc { color: var(--muted); }

    .goals-block {
      margin-bottom: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .goals-block h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .goals-list { list-style: none; font-size: 14px; }
    .goals-list li { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .goals-list li:last-child { border-bottom: none; }
    .g-min { color: var(--accent); font-weight: 700; min-width: 32px; display: inline-block; }
    .g-assist { color: var(--muted); font-size: 12px; }
    .goals-empty { color: var(--muted); font-size: 13px; }
    .goals-live { color: #4cc978; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-left: 6px; }

    .modal-loading { text-align: center; color: var(--muted); font-size: 13px; padding: 12px 0; }

    .visitor-modal { max-width: 360px; text-align: center; }
    .visitor-modal h2 { font-size: 16px; color: var(--accent); }
    .visitor-badge-wrap { margin: 12px 0 8px; display: flex; justify-content: center; }
    .visitor-badge-wrap img { height: 36px; width: auto; border-radius: 4px; }
    .visitor-label { font-size: 13px; color: var(--muted); }
    .visitor-geo { font-size: 15px; color: var(--text); margin-top: 10px; font-weight: 600; }

    .visitor-weeks {
      width: 100%;
      margin-top: 14px;
      border-collapse: collapse;
      font-size: 13px;
      text-align: left;
    }

    .visitor-weeks th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }

    .visitor-weeks td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .visitor-weeks tr:last-child td { border-bottom: none; }
    .visitor-weeks .c { text-align: right; font-weight: 700; color: var(--accent); }
    .visitor-weeks-head { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-top: 12px; text-align: left; }

    @media (max-width: 768px) {
      html, body { height: auto; min-height: 100dvh; overflow-x: hidden; overflow-y: auto; }
      .page { height: auto; min-height: 100dvh; padding: 10px 12px 12px; gap: 10px; }
      .grid { flex: none; display: flex; flex-direction: column; gap: 10px; }
      .panel { flex: none; min-height: auto; }
      .match-scroll, .third-scroll { flex: none; overflow: visible; }
      .title { font-size: 18px; white-space: normal; }
      .fixture { font-size: 15px; white-space: normal; line-height: 1.3; }
      .matches-table th, .matches-table td { padding: 5px 4px; }
      .third-panel { width: 100%; }
      .third-panel .t-team { max-width: none; }
      .team-cards { grid-template-columns: 1fr; }
      .overlay { padding: 8px; align-items: flex-end; }
      .modal { max-height: 92dvh; border-radius: 14px 14px 0 0; }
      .stadium-img { height: 110px; }
      .modal-score { font-size: 24px; }
      .match-row.past td { padding-top: 7px; padding-bottom: 7px; }
      .match-row.past + .match-row.past td { padding-top: 10px; }
      .match-row.past + .match-row:not(.past) td { padding-top: 16px; }
      .date-row + .match-row:not(.past) td { padding-top: 8px; }
    }
  </style>
</head>
<body>
  <img id="hit-ping" src="https://hits.sh/jay2090x.github.io/wm-spiele-2026.svg" alt="" width="1" height="1" hidden>
  <div class="page">
    <header>
      <div class="title"><span title="WM 2026">🏆</span> <span>WM 2026</span> · Nächste Spiele</div>
      <div class="mez">Live</div>
    </header>

    <div class="grid">
      <section class="panel matches-panel">
        <div class="panel-head">Spiele</div>
        <div class="match-scroll">
          <table class="matches-table">
            <thead>
              <tr>
                <th>Zeit</th>
                <th class="c">Gr</th>
                <th>Spiel</th>
                <th class="c">Res</th>
                <th class="c">TV</th>
              </tr>
            </thead>
            <tbody id="matches"></tbody>
          </table>
        </div>
      </section>

      <section class="panel third-panel">
        <div class="panel-head">3. Plätze <span class="pill">Top 8 →</span></div>
        <div class="third-scroll">
          <table>
            <thead>
              <tr>
                <th class="c">#</th>
                <th>Team</th>
                <th class="c">P</th>
                <th class="c">TD</th>
                <th class="c">Live</th>
              </tr>
            </thead>
            <tbody id="third-place-body"></tbody>
          </table>
        </div>
        <div class="stats-block" id="stats-block">
          <div class="stats-head">Statistik</div>
          <div class="stats-grid" id="stats-grid"></div>
        </div>
      </section>
    </div>

    <footer id="footer-note" title="">Live-Daten · Tippen für Details · * Gruppe offen</footer>
  </div>

  <div class="overlay" id="match-overlay">
    <div class="modal" id="match-modal">
      <div class="modal-head">
        <div>
          <h2 id="modal-title"></h2>
          <div class="meta" id="modal-meta"></div>
        </div>
        <button class="modal-close" id="modal-close" aria-label="Schließen">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-score" id="modal-score"></div>
        <div id="modal-venue"></div>
        <div id="modal-goals"></div>
        <div class="team-cards" id="modal-teams"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="team-overlay" style="z-index:110">
    <div class="modal team-modal">
      <div class="modal-head">
        <div>
          <h2 id="team-modal-title"></h2>
          <div class="meta" id="team-modal-meta"></div>
        </div>
        <button class="modal-close" id="team-modal-close" aria-label="Schließen">✕</button>
      </div>
      <div class="modal-body" id="team-modal-body">
        <div class="modal-loading">Laden…</div>
      </div>
    </div>
  </div>

  <div class="overlay" id="visitor-overlay">
    <div class="modal visitor-modal">
      <div class="modal-head" style="justify-content:center;border:none;padding-bottom:0">
        <div><h2>Besucher</h2></div>
        <button class="modal-close" id="visitor-close" aria-label="Schließen" style="position:absolute;right:12px;top:12px">✕</button>
      </div>
      <div class="modal-body">
        <div class="visitor-badge-wrap"><img id="visitor-badge" src="" alt="Besucherzahl"></div>
        <div class="visitor-label">Seitenaufrufe gesamt</div>
        <div class="visitor-geo" id="visitor-geo"></div>
        <div class="visitor-weeks-head">Letzte Wochen</div>
        <table class="visitor-weeks">
          <thead><tr><th>Woche</th><th class="c">Besucher</th></tr></thead>
          <tbody id="visitor-weeks-body"><tr><td colspan="2" style="text-align:center;color:var(--muted)">Laden…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const ESPN_SCORE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
    const ESPN_STANDINGS = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings';
    const ESPN_SUMMARY = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary';
    const HITS_URL = 'https://hits.sh/jay2090x.github.io/wm-spiele-2026.svg';
    const SHORT_URL = 'https://is.gd/bCGUlI';
    const ESPN_TEAMS = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/teams';
    const FINISHED_VISIBLE_MS = 24 * 60 * 60 * 1000;
    const MATCH_DURATION_MS = 105 * 60 * 1000;
    const tz = 'Europe/Berlin';

    const COUNTRIES = {
      norwegen: { name:'Norwegen', flag:'🇳🇴', pop:5.5, capital:'Oslo', continent:'Europa', lat:59.91, lng:10.75, area:'385.207 km²', conf:'UEFA' },
      frankreich: { name:'Frankreich', flag:'🇫🇷', pop:68.4, capital:'Paris', continent:'Europa', lat:48.86, lng:2.35, area:'643.801 km²', conf:'UEFA' },
      senegal: { name:'Senegal', flag:'🇸🇳', pop:18.5, capital:'Dakar', continent:'Afrika', lat:14.69, lng:-17.44, area:'196.722 km²', conf:'CAF' },
      irak: { name:'Irak', flag:'🇮🇶', pop:45.5, capital:'Bagdad', continent:'Asien', lat:33.31, lng:44.37, area:'438.317 km²', conf:'AFC' },

    function formatDateShort(date) {
      const now = new Date();
      const today = new Date(now.toLocaleString('en-US', { timeZone: tz }));
      today.setHours(0, 0, 0, 0);
      const matchDay = new Date(date.toLocaleString('en-US', { timeZone: tz }));
      matchDay.setHours(0, 0, 0, 0);
      const diff = (matchDay - today) / 86400000;
      if (diff === 0) return 'Heute';
      if (diff === 1) return 'Morgen';
      if (diff === -1) return 'Gestern';
      return new Intl.DateTimeFormat('de-DE', { timeZone: tz, weekday: 'short', day: 'numeric', month: 'short' }).format(date);
    }

      try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(key)}`);
        if (!res.ok) { wikiImageCache[key] = null; return null; }
        const d = await res.json();
        const url = d.thumbnail?.source || null;

        const goals = (data.keyEvents || [])
          .filter(e => e.scoringPlay)
          .map(e => ({
            minute: e.clock?.displayValue || '?',
            teamEn: e.team?.displayName || '',
            scorer: e.participants?.[0]?.athlete?.displayName || (e.shortText || '').replace(/ Goal$/, ''),
            assist: e.participants?.[1]?.athlete?.displayName || '',
          }));
        const summary = {
          venueName: venue.fullName || '',
          venueCity: venue.address?.city || '',
          venueCountry: venue.address?.country || '',
          attendance: data.gameInfo?.attendance || null,
          goals,
        };
        matchSummaryCache[espnId] = summary;
        return summary;
      } catch (_) {
        return matchSummaryCache[espnId] || null;

    async function fetchLiveData() {
      const dates = getDateRange();
      const scoreMap = {};
      const gLive = {};
      const events = [];

      await Promise.all(dates.map(async (d) => {
        try {
          const res = await fetch(`${ESPN_SCORE}?dates=${d}`);
          const data = await res.json();
          for (const e of data.events || []) {
            const c = e.competitions[0];
            const st = c.status;
            const comps = c.competitors;
            const home = comps.find(x => x.homeAway === 'home');
            const away = comps.find(x => x.homeAway === 'away');
            const lookup = MATCH_LOOKUP[e.id];
            const group = lookup?.group;

            const entry = {
              id: e.id,
              homeScore: home?.score ?? '0',
              awayScore: away?.score ?? '0',
              state: st.type.state,
              description: st.type.description,
              clock: st.displayClock || '',
              period: st.period || 0,
              venue: c.venue?.fullName || '',
              venueCity: c.venue?.address?.city || '',
              venueCountry: c.venue?.address?.country || '',
              homeEn: home?.team?.displayName || '',
              awayEn: away?.team?.displayName || '',
              homeAbbr: home?.team?.abbreviation || '',
              awayAbbr: away?.team?.abbreviation || '',
              date: e.date,
              group,
            };
            scoreMap[e.id] = entry;
            events.push(entry);

            if (group && st.type.state === 'in') {
              gLive[group] = {
                homeScore: entry.homeScore,
                awayScore: entry.awayScore,
                clock: entry.clock,
                label: `${entry.homeAbbr} ${entry.homeScore}:${entry.awayScore} ${entry.awayAbbr}`,
              };
            }
          }
        } catch (_) {}
      }));

      liveScores = scoreMap;
      groupLive = gLive;
      allEvents = events;

      try {
        const res = await fetch(ESPN_STANDINGS);
        const data = await res.json();
        const third = [];
        const groups = {};
        for (const g of data.children || []) {
          const group = g.abbreviation.replace('Group ', '');
          const entries = [];
          for (const e of g.standings?.entries || []) {
            const stats = Object.fromEntries(e.stats.map(s => [s.abbreviation, s]));
            const en = e.team.displayName;
            const meta = teamDisplayMeta(en);
            const gdRaw = stats.GD?.displayValue || '0';
            const row = {
              espnEn: en,
              team: meta[0], flag: meta[1], key: meta[2], group,
              gp: parseInt(stats.GP?.displayValue, 10) || 0,
              w: parseInt(stats.W?.displayValue, 10) || 0,
              d: parseInt(stats.D?.displayValue, 10) || 0,
              l: parseInt(stats.L?.displayValue, 10) || 0,
              gd: gdRaw,
              pts: parseInt(stats.P?.displayValue, 10) || 0,
              rank: parseInt(stats.R?.displayValue, 10) || 0,
            };
            entries.push(row);
            if (row.rank === 3) {
              third.push({
                team: row.team, flag: row.flag, key: row.key, group,
                pts: row.pts,
                gd: parseInt(String(gdRaw).replace('+', ''), 10) || 0,
                played: row.gp,
                qualified: CLINCHED.has(en),
                final: row.gp >= 3,
              });
            }
          }
          entries.sort((a, b) => a.rank - b.rank);
          groups[group] = entries;
        }
        third.sort((a, b) => b.pts - a.pts || b.gd - a.gd);
        thirdPlaceData = third;
        groupStandings = groups;

    function isMatchVisible(m, now) {

      if (s?.state === 'in') return true;
      if (!s || s.state === 'pre') return m.startDate.getTime() + MATCH_DURATION_MS > now.getTime();
      if (s.state === 'post') {
        const end = m.startDate.getTime() + MATCH_DURATION_MS;
        return end + FINISHED_VISIBLE_MS > now.getTime();
      }
      return m.startDate.getTime() + MATCH_DURATION_MS > now.getTime();
    }

    function getScoreHtml(match, tiny = false) {
      const s = liveScores[match.espnId];
      if (!s || s.state === 'pre') return '<span class="score" style="color:var(--muted)">–</span>';
      const hs = match.espnHome ? s.homeScore : s.awayScore;
      const as = match.espnHome ? s.awayScore : s.homeScore;
      const score = `${hs}:${as}`;
      const cls = tiny ? 'score tiny' : 'score';
      if (s.state === 'in') {
        const min = s.clock ? `${s.clock}'` : 'LIVE';
        return `<span class="${cls} live-score">${score} <span class="min">${min}</span></span>`;
      }
      if (s.state === 'post') return `<span class="${cls} final-score">${score}</span>`;
      return `<span class="${cls}">${score}</span>`;
    }

      return '';
    }

    function renderMatches() {
      const now = new Date();
      const visible = DISPLAY_MATCHES
        .filter(m => isMatchVisible(m, now))
        .sort((a, b) => {
          const sa = liveScores[a.espnId]?.state;
          const sb = liveScores[b.espnId]?.state;
          if (sa === 'in' && sb !== 'in') return -1;
          if (sb === 'in' && sa !== 'in') return 1;
          if (sa === 'post' && sb !== 'post') return 1;
          if (sb === 'post' && sa !== 'post') return -1;
          return a.startDate - b.startDate;
        });

      const tbody = document.getElementById('matches');
      if (!visible.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:8px">Keine Spiele</td></tr>';
        return;
      }

      let html = '';
      let lastDate = '';

      for (const m of visible) {
        const dateKey = formatDateShort(m.startDate);
        if (dateKey !== lastDate) {
          html += `<tr class="date-row"><td colspan="5">${dateKey}</td></tr>`;
          lastDate = dateKey;
        }

        const s = liveScores[m.espnId];
        const live = s?.state === 'in';
        const past = s?.state === 'post';
        const cd = (!live && !past) ? formatCountdown(m.startDate - now) : '';
        const tvClass = m.broadcaster === 'ORF' ? 'tv-orf' : 'tv-servus';

        let timeCell;
        if (live) timeCell = '<span class="live-txt">LIVE</span>';
        else if (past) timeCell = '<span class="past-txt">Beendet</span>';
        else timeCell = `${formatTime(m.startDate)}${cd ? `<br><span class="cd">${cd}</span>` : ''}`;

        html += `
          <tr class="match-row${getRowClass(m, now)}" data-espn="${m.espnId}">
            <td class="time">${timeCell}</td>
            <td class="c"><span class="grp group-${m.group}">${m.group}</span></td>
            <td class="fixture">${m.homeFlag} ${m.home} – ${m.away} ${m.awayFlag}</td>
            <td class="c">${getScoreHtml(m)}</td>
            <td class="c"><span class="tv ${tvClass}">${m.broadcaster === 'ORF' ? 'ORF' : 'Servus'}</span></td>
          </tr>`;
      }

      tbody.innerHTML = html;
    }

    function getGroupLiveHtml(group) {
      const g = groupLive[group];
      if (!g) return '<span style="color:var(--muted);font-size:12px">–</span>';
      return `<span class="score tiny live-score">${g.label} <span class="min">${g.clock}'</span></span>`;
    }

    function renderThirdPlace() {
      const tbody = document.getElementById('third-place-body');
      if (!thirdPlaceData?.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted)">Laden…</td></tr>';
        return;
      }

      tbody.innerHTML = thirdPlaceData.map((t, i) => {
        const rank = i + 1;
        let cls = '';
        if (t.qualified) cls = 'qualified';
        else if (rank <= 8) cls = rank === 8 ? 'qualified cutline' : 'qualified';
        else cls = 'out';

        const keyAttr = t.key ? ` data-team-key="${t.key}"` : '';
        return `
          <tr class="${cls} team-row"${keyAttr}>
            <td class="c">${rank}</td>
            <td class="t-team">${t.flag} ${t.team}<span class="t-grp"> ${t.group}${t.final ? '' : '*'}</span></td>
            <td class="c">${t.pts}</td>
            <td class="c">${t.gd > 0 ? '+' + t.gd : t.gd}</td>
            <td class="c">${getGroupLiveHtml(t.group)}</td>
          </tr>`;
      }).join('');
    }

    function stopModalPoll() {
      clearInterval(modalPollTimer);
      modalPollTimer = null;
    }

    function startModalPoll(espnId) {
      stopModalPoll();
      if (liveScores[espnId]?.state === 'in') {
        modalPollTimer = setInterval(() => renderMatchModal(espnId, true), 20000);
      }
    }

    function renderGoalsHtml(goals, isLive) {
      if (!goals?.length) {
        return `<div class="goals-block"><h4>Torschützen${isLive ? '<span class="goals-live">· live</span>' : ''}</h4><div class="goals-empty">Noch keine Tore</div></div>`;
      }
      const items = goals.map(g => {
        const t = teamFromEn(g.teamEn);
        const assist = g.assist ? `<span class="g-assist"> (${g.assist})</span>` : '';
        return `<li><span class="g-min">${g.minute}</span> ${t.flag} ${g.scorer}${assist}</li>`;
      }).join('');
      return `<div class="goals-block"><h4>Torschützen${isLive ? '<span class="goals-live">· live</span>' : ''}</h4><ul class="goals-list">${items}</ul></div>`;
    }

    function renderVenueHtml(summary, stadiumImg) {
      const vName = summary?.venueName || '';
      const vCity = summary?.venueCity || '';
      const vCountry = summary?.venueCountry || '';
      const loc = [vCity, vCountry].filter(Boolean).join(' · ') || '–';
      const att = summary?.attendance ? `${summary.attendance.toLocaleString('de-DE')} Zuschauer` : '';
      const img = stadiumImg
        ? `<img class="stadium-img" src="${stadiumImg}" alt="${vName}" loading="lazy">`
        : '';
      return `<div class="venue-block">${img}<div class="venue-info"><strong>📍 ${vName || 'Spielort'}</strong><div class="loc">${loc}</div>${att ? `<div class="loc">${att}</div>` : ''}</div></div>`;
    }

    function parseCompScore(score) {
      if (score == null) return '–';
      if (typeof score === 'object') return score.displayValue ?? '–';
      return String(score);
    }

    function findTeamGroup(key) {
      for (const [grp, teams] of Object.entries(groupStandings)) {
        if (teams.some(t => t.key === key)) return grp;
      }
      for (const m of DISPLAY_MATCHES) {
        if (m.homeKey === key || m.awayKey === key) return m.group;
      }
      return null;
    }

    function renderGroupStandingsHtml(group, highlightKey) {
      const rows = groupStandings[group] || [];
      if (!rows.length) return '<div class="goals-empty" style="padding:10px">Keine Tabellendaten</div>';
      const body = rows.map(r => {
        const hl = r.key === highlightKey ? ' class="highlight"' : '';
        const gd = String(r.gd).startsWith('+') || String(r.gd).startsWith('-') ? r.gd : (parseInt(r.gd, 10) > 0 ? '+' + r.gd : r.gd);
        return `<tr${hl}><td class="c">${r.rank}</td><td class="t-name">${r.flag} ${r.team}</td><td class="c">${r.gp}</td><td class="c">${r.w}</td><td class="c">${r.d}</td><td class="c">${r.l}</td><td class="c">${gd}</td><td class="c">${r.pts}</td></tr>`;
      }).join('');
      return `<table class="group-table"><thead><tr><th class="c">#</th><th>Team</th><th class="c">Sp</th><th class="c">S</th><th class="c">U</th><th class="c">N</th><th class="c">TD</th><th class="c">P</th></tr></thead><tbody>${body}</tbody></table>`;
    }

    async function fetchTeamSchedule(teamKey) {
      const espnId = KEY_TO_ESPN_ID[teamKey];
      if (!espnId) return [];
      if (teamScheduleCache[teamKey]) return teamScheduleCache[teamKey];
      try {
        const res = await fetch(`${ESPN_TEAMS}/${espnId}/schedule`);
        const data = await res.json();
        const games = (data.events || []).map(e => {
          const c = e.competitions[0];
          const st = c.status.type;
          const home = c.competitors.find(x => x.homeAway === 'home');
          const away = c.competitors.find(x => x.homeAway === 'away');
          return {
            date: new Date(e.date),
            state: st.state,
            homeEn: home?.team?.displayName || '',
            awayEn: away?.team?.displayName || '',
            homeScore: parseCompScore(home?.score),
            awayScore: parseCompScore(away?.score),
          };
        }).sort((a, b) => b.date - a.date);
        teamScheduleCache[teamKey] = games;
        return games;
      } catch (_) {
        return [];
      }
    }

    function renderRecentGamesHtml(games, teamKey) {
      if (!games.length) return '<div class="goals-empty" style="padding:10px">Keine Spiele</div>';
      const items = games.slice(0, 4).map(g => {
        const home = teamFromEn(g.homeEn);
        const away = teamFromEn(g.awayEn);
        const date = new Intl.DateTimeFormat('de-DE', { day: '2-digit', month: '2-digit' }).format(g.date);
        let score = '';
        if (g.state === 'in') score = `<span class="recent-live">LIVE ${g.homeScore}:${g.awayScore}</span>`;
        else if (g.state === 'post') score = `<span class="recent-score">${g.homeScore}:${g.awayScore}</span>`;
        else score = `<span style="color:var(--muted)">${formatTime(g.date)}</span>`;
        return `<li><span class="recent-date">${date}</span><span>${home.flag} ${home.name} – ${away.name} ${away.flag}</span>${score}</li>`;
      }).join('');
      return `<ul class="recent-list">${items}</ul>`;
    }

    async function openTeamModal(teamKey) {
      const team = c(teamKey);
      const group = findTeamGroup(teamKey);
      document.getElementById('team-modal-title').textContent = `${team.flag} ${team.name}`;
      document.getElementById('team-modal-meta').textContent = group ? `Gruppe ${group} · WM 2026` : 'WM 2026';
      document.getElementById('team-modal-body').innerHTML = '<div class="modal-loading">Laden…</div>';
      document.getElementById('team-overlay').classList.add('open');

      const games = await fetchTeamSchedule(teamKey);
      document.getElementById('team-modal-body').innerHTML = `
        <div class="team-section">
          <h4>Gruppe ${group || '–'}</h4>
          ${group ? renderGroupStandingsHtml(group, teamKey) : '<div class="goals-empty" style="padding:10px">–</div>'}
        </div>
        <div class="team-section">
          <h4>Letzte Spiele</h4>
          ${renderRecentGamesHtml(games, teamKey)}
        </div>`;
    }

    function closeTeamModal() {
      document.getElementById('team-overlay').classList.remove('open');
    }

    function renderTeamCard(team, imgUrl, teamKey) {
      const img = imgUrl
        ? `<img class="country-img" src="${imgUrl}" alt="Flagge ${team.name}" loading="lazy">`
        : `<div class="flag-fallback">${team.flag}</div>`;
      return `
        <div class="team-card team-card-btn" data-team-key="${teamKey}" role="button" tabindex="0">
          <h3>${team.flag} ${team.name}</h3>
          ${img}
          <dl>
            <dt>Einwohner</dt><dd>ca. ${team.pop} Mio.</dd>
            <dt>Hauptstadt</dt><dd>${team.capital}</dd>
            <dt>Kontinent</dt><dd>${team.continent}</dd>
            <dt>Fläche</dt><dd>${team.area}</dd>
            <dt>Verband</dt><dd>${team.conf}</dd>
          </dl>
        </div>`;
    }

    async function renderMatchModal(espnId, forceSummary = false) {
      const m = DISPLAY_MATCHES.find(x => x.espnId === espnId);
      if (!m) return;
      const s = liveScores[espnId] || {};
      const home = c(m.homeKey);
      const away = c(m.awayKey);
      const isLive = s.state === 'in';

      document.getElementById('modal-title').textContent = `${home.flag} ${home.name} – ${away.name} ${away.flag}`;
      document.getElementById('modal-meta').textContent =
        `Gruppe ${m.group} · ${formatTime(m.startDate)} · ${m.broadcaster}`;

      let scoreText = '– : –';
      if (s.state === 'in' || s.state === 'post') {
        const hs = m.espnHome ? s.homeScore : s.awayScore;
        const as = m.espnHome ? s.awayScore : s.homeScore;
        scoreText = `${hs} : ${as}`;
        if (isLive) scoreText += `  (${s.clock || 'LIVE'}')`;
        if (s.state === 'post') scoreText += '  · Endstand';
      } else {
        scoreText = `Anstoß ${formatTime(m.startDate)}`;
      }
      document.getElementById('modal-score').textContent = scoreText;

      const summary = await fetchMatchSummary(espnId, forceSummary || isLive);
      const venueName = summary?.venueName || s.venue || '';
      const stadiumImg = await getWikiImage(venueName);
      const homeImg = countryFlagUrl(m.homeKey);
      const awayImg = countryFlagUrl(m.awayKey);

      document.getElementById('modal-venue').innerHTML = renderVenueHtml(summary || {
        venueName: s.venue, venueCity: s.venueCity, venueCountry: s.venueCountry, attendance: null,
      }, stadiumImg);
      document.getElementById('modal-goals').innerHTML = renderGoalsHtml(summary?.goals, isLive);
      document.getElementById('modal-teams').innerHTML = renderTeamCard(home, homeImg, m.homeKey) + renderTeamCard(away, awayImg, m.awayKey);
    }

    async function openMatchModal(espnId) {
      openModalId = espnId;
      document.getElementById('modal-venue').innerHTML = '<div class="modal-loading">Lade Spielort…</div>';
      document.getElementById('modal-goals').innerHTML = '';
      document.getElementById('modal-teams').innerHTML = '<div class="modal-loading">Lade Teams…</div>';
      document.getElementById('match-overlay').classList.add('open');
      await renderMatchModal(espnId, true);
      startModalPoll(espnId);
    }

    function closeMatchModal() {
      openModalId = null;
      stopModalPoll();
      document.getElementById('match-overlay').classList.remove('open');
    }

    function computeCounterStats() {
      const now = Date.now();
      let totalGoals = 0, matchesDone = 0, matchesLive = 0, matchesUpcoming = 0, goalsToday = 0;
      const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: tz }).format(new Date());

      for (const e of allEvents) {
        const hs = parseInt(e.homeScore, 10) || 0;
        const as = parseInt(e.awayScore, 10) || 0;
        if (e.state === 'post') { totalGoals += hs + as; matchesDone++; }
        if (e.state === 'in') { totalGoals += hs + as; matchesLive++; }
        if (e.state === 'pre') matchesUpcoming++;
        const evDay = new Intl.DateTimeFormat('en-CA', { timeZone: tz }).format(new Date(e.date));
        if (evDay === todayStr && e.state === 'post') goalsToday += hs + as;
      }

      const groupsOpen = thirdPlaceData ? thirdPlaceData.filter(t => !t.final).length : 0;
      const inZone = thirdPlaceData ? thirdPlaceData.filter((_, i) => i < 8).length : 0;
      const nextMatch = DISPLAY_MATCHES
        .filter(m => liveScores[m.espnId]?.state !== 'post' && m.startDate > new Date())
        .sort((a, b) => a.startDate - b.startDate)[0];

      const austriaMatch = DISPLAY_MATCHES.find(m => m.homeKey === 'oesterreich' || m.awayKey === 'oesterreich');
      const uptimeMin = Math.floor((now - pageStart) / 60000);

      return {
        totalGoals, matchesDone, matchesLive, matchesUpcoming,
        goalsToday, groupsOpen, inZone,
        totalWMMatches: 104,
        progress: Math.round((matchesDone / 104) * 100),
        avgGoals: matchesDone ? (totalGoals / matchesDone).toFixed(2) : '0',
        liveGroups: Object.keys(groupLive).length,
        thirdTeams: thirdPlaceData?.length || 0,
        refreshCount, uptimeMin,
        nextMatch: nextMatch ? `${nextMatch.home} – ${nextMatch.away} in ${formatCountdown(nextMatch.startDate - new Date())}` : '–',
        austria: austriaMatch ? `${austriaMatch.home} vs ${austriaMatch.away} · ${formatTime(austriaMatch.startDate)}` : '–',
        popPlaying: DISPLAY_MATCHES.filter(m => liveScores[m.espnId]?.state === 'in')
          .reduce((s, m) => s + c(m.homeKey).pop + c(m.awayKey).pop, 0).toFixed(1),
      };
    }

    function renderStats() {
      const s = computeCounterStats();
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-item"><div class="val">${s.totalGoals}</div><div class="lbl">Tore gesamt</div></div>
        <div class="stat-item"><div class="val">${s.goalsToday}</div><div class="lbl">Tore heute</div></div>
        <div class="stat-item"><div class="val">${s.matchesLive}</div><div class="lbl">Live</div></div>
        <div class="stat-item"><div class="val">${s.matchesDone}</div><div class="lbl">Beendet</div></div>
        <div class="stat-item"><div class="val">${s.progress}%</div><div class="lbl">Fortschritt</div></div>
        <div class="stat-item"><div class="val">${s.avgGoals}</div><div class="lbl">Ø Tore</div></div>`;
    }

    function formatWeekRange(from, to) {
      const f = new Date(from + 'T12:00:00');
      const t = new Date(to + 'T12:00:00');
      const fd = f.getDate(), fm = f.getMonth() + 1;
      const td = t.getDate(), tm = t.getMonth() + 1;
      if (fm === tm) return `${fd}.–${td}.${fm}.`;
      return `${fd}.${fm}.–${td}.${tm}.`;
    }

    function renderVisitorWeeks(data) {
      const tbody = document.getElementById('visitor-weeks-body');
      const items = (data?.items || []).slice().reverse();
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;color:var(--muted)">Noch keine Daten</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(w => {
        const total = (w.data || []).reduce((s, d) => s + (d.value || 0), 0);
        return `<tr><td>${formatWeekRange(w.from, w.to)}</td><td class="c">${total.toLocaleString('de-DE')}</td></tr>`;
      }).join('');
    }

    async function fetchVisitorWeeks() {
      try {
        const res = await fetch('visitor-stats.json?' + Date.now());
        if (res.ok) return renderVisitorWeeks(await res.json());
      } catch (_) {}
      renderVisitorWeeks(null);
    }

    function openVisitorCounter() {
      document.getElementById('visitor-badge').src = hitsBadgeUrl({ _: Date.now() });
      const geoEl = document.getElementById('visitor-geo');
      if (visitorGeo.city || visitorGeo.country) {
        const city = visitorGeo.city || '–';
        const land = countryDe(visitorGeo.country || '');
        geoEl.textContent = `${city} · ${land}`;
      } else {
        geoEl.textContent = 'Standort unbekannt';
      }
      fetchVisitorWeeks();
      document.getElementById('visitor-overlay').classList.add('open');
    }

    function updateFooter() {
      const el = document.getElementById('footer-note');
      if (lastFetch) {
        el.innerHTML = `Live · ${formatTime(lastFetch)} · Tippen für Details · * offen · <a href="${SHORT_URL}" target="_blank" rel="noopener">Kurzlink</a>`;
      }
    }

    async function refresh() {
      await fetchLiveData();
      renderMatches();
      renderThirdPlace();
      renderStats();
      updateFooter();
      if (openModalId) {
        await renderMatchModal(openModalId, liveScores[openModalId]?.state === 'in');
        startModalPoll(openModalId);
      }
    }

    document.getElementById('matches').addEventListener('click', (e) => {
      const row = e.target.closest('[data-espn]');
      if (row) openMatchModal(row.dataset.espn);
    });

    document.getElementById('modal-close').onclick = closeMatchModal;
    document.getElementById('match-overlay').onclick = (e) => { if (e.target.id === 'match-overlay') closeMatchModal(); };

    document.getElementById('modal-teams').addEventListener('click', (e) => {
      const card = e.target.closest('[data-team-key]');
      if (card?.dataset.teamKey) openTeamModal(card.dataset.teamKey);
    });

    document.getElementById('third-place-body').addEventListener('click', (e) => {
      const row = e.target.closest('[data-team-key]');
      if (row?.dataset.teamKey) openTeamModal(row.dataset.teamKey);
    });

    document.getElementById('team-modal-close').onclick = closeTeamModal;
    document.getElementById('team-overlay').onclick = (e) => { if (e.target.id === 'team-overlay') closeTeamModal(); };
    document.getElementById('visitor-close').onclick = () => document.getElementById('visitor-overlay').classList.remove('open');
    document.getElementById('visitor-overlay').onclick = (e) => { if (e.target.id === 'visitor-overlay') e.target.classList.remove('open'); };

    document.getElementById('footer-note').addEventListener('click', () => {
      visitorClicks++;
      clearTimeout(visitorTimer);
      visitorTimer = setTimeout(() => { visitorClicks = 0; }, 2000);
      if (visitorClicks >= 5) { visitorClicks = 0; openVisitorCounter(); }
    });

    fetchVisitorGeo();
    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
